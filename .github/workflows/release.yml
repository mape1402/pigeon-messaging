name: Release to NuGet

on:
  workflow_dispatch:

env:
  CHANGELOG_PATH: CHANGELOG.md
  CONFIGURATION: Release
  DOTNET_TARGET: .
  NUGET_OUTPUT: ./nupkgs
  NUGET_SOURCE: https://api.nuget.org/v3/index.json
  NUGET_USER: ${{ vars.NUGET_USER }}
  RELEASE_BRANCH_PATTERN: ^releases/v[0-9]+\.[0-9]+\.[0-9]+$
  RELEASE_BRANCH_PREFIX: releases/
  RELEASE_NOTES_PATH: release_notes.txt

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release branch
        id: version
        shell: bash
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          if [[ ! "$BRANCH" =~ $RELEASE_BRANCH_PATTERN ]]; then
            echo "Production releases must run from a branch matching $RELEASE_BRANCH_PATTERN. Current branch: $BRANCH"
            exit 1
          fi

          TAG="${BRANCH#"$RELEASE_BRANCH_PREFIX"}"
          VERSION="${TAG#v}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate CHANGELOG entry
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          TAG_LINE=$(grep -m1 -E "^## \\[$TAG\\]" "$CHANGELOG_PATH" || true)

          if [[ -z "$TAG_LINE" ]]; then
            echo "$CHANGELOG_PATH must contain a section for $TAG before deploying."
            exit 1
          fi

          awk -v tag_line="$TAG_LINE" '
            $0 == tag_line { in_section=1; next }
            in_section && /^## / { exit }
            in_section
          ' "$CHANGELOG_PATH" > "$RELEASE_NOTES_PATH"

          if [[ ! -s "$RELEASE_NOTES_PATH" ]]; then
            echo "$CHANGELOG_PATH section for $TAG is empty."
            exit 1
          fi

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore "$DOTNET_TARGET"

      - name: Build
        run: >
          dotnet build "$DOTNET_TARGET"
          --no-restore
          --configuration "$CONFIGURATION"
          /p:Version=${{ steps.version.outputs.version }}
          /p:PackageVersion=${{ steps.version.outputs.version }}
          /p:MinVerVersionOverride=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test "$DOTNET_TARGET" --no-build --configuration "$CONFIGURATION" --verbosity normal

      - name: Pack NuGet packages
        run: >
          dotnet pack "$DOTNET_TARGET"
          --no-build
          --configuration "$CONFIGURATION"
          --output "$NUGET_OUTPUT"
          /p:Version=${{ steps.version.outputs.version }}
          /p:PackageVersion=${{ steps.version.outputs.version }}
          /p:MinVerVersionOverride=${{ steps.version.outputs.version }}

      - name: Create or update release tag
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          HEAD_SHA="$(git rev-parse HEAD)"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/$TAG:refs/tags/$TAG"
            TAG_SHA="$(git rev-list -n 1 "$TAG")"

            if [[ "$TAG_SHA" == "$HEAD_SHA" ]]; then
              echo "Tag $TAG already points to $HEAD_SHA. Nothing to update."
            else
              echo "Tag $TAG points to $TAG_SHA and will be moved to $HEAD_SHA."
              git tag --force "$TAG" "$HEAD_SHA"
              git push --force origin "refs/tags/$TAG"
            fi
          else
            git tag --force "$TAG" "$HEAD_SHA"
            git push origin "refs/tags/$TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: ${{ env.RELEASE_NOTES_PATH }}
          draft: false
          prerelease: false
          files: |
            ${{ env.NUGET_OUTPUT }}/*.nupkg
            ${{ env.NUGET_OUTPUT }}/*.snupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate NuGet trusted publishing user
        shell: bash
        run: |
          if [[ -z "$NUGET_USER" ]]; then
            echo "Repository variable NUGET_USER must be set to the nuget.org username that created the Trusted Publishing policy."
            echo "This is not necessarily the package owner, organization, GitHub repository owner, or policy name."
            exit 1
          fi

      - name: NuGet trusted publishing login
        uses: NuGet/login@v1
        id: nuget_login
        with:
          user: ${{ env.NUGET_USER }}

      - name: Push to NuGet
        shell: bash
        run: |
          shopt -s nullglob

          packages=("$NUGET_OUTPUT"/*.nupkg)
          symbols=("$NUGET_OUTPUT"/*.snupkg)

          if (( ${#packages[@]} == 0 )); then
            echo "No .nupkg files were found in $NUGET_OUTPUT."
            exit 1
          fi

          for package in "${packages[@]}"; do
            dotnet nuget push "$package" -k ${{ steps.nuget_login.outputs.NUGET_API_KEY }} -s "$NUGET_SOURCE" --skip-duplicate
          done

          for symbol in "${symbols[@]}"; do
            dotnet nuget push "$symbol" -k ${{ steps.nuget_login.outputs.NUGET_API_KEY }} -s "$NUGET_SOURCE" --skip-duplicate
          done
